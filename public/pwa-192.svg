<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Weißer Hintergrund (wichtig für Smartphone-Homescreen) -->
  <rect width="192" height="192" fill="white"/>
  <!-- Grüner App-Icon-Hintergrund -->
  <rect width="192" height="192" rx="40" fill="#1D9E75"/>

  <defs>
    <clipPath id="ball">
      <circle cx="96" cy="92" r="58"/>
    </clipPath>
  </defs>

  <!-- Weißer Ball -->
  <circle cx="96" cy="92" r="58" fill="white"/>

  <!-- Fußball-Patches (geclippt auf Ballkreis) -->
  <g clip-path="url(#ball)" fill="#1a1a1a">
    <!-- Mittleres Pentagon (Spitze nach oben, Mitte bei 96,86) -->
    <polygon points="96,66 116,80 108,103 84,103 76,80"/>
    <!-- Außen oben -->
    <polygon points="96,66 73,49 82,23 110,23 119,49"/>
    <!-- Außen rechts oben -->
    <polygon points="116,80 125,54 154,54 162,81 139,97"/>
    <!-- Außen rechts unten -->
    <polygon points="108,103 136,103 145,130 122,147 99,130"/>
    <!-- Außen links unten -->
    <polygon points="84,103 93,130 70,147 47,131 56,103"/>
    <!-- Außen links oben -->
    <polygon points="76,80 54,97 31,81 39,54 67,54"/>
  </g>

  <!-- Ball-Rand -->
  <circle cx="96" cy="92" r="58" fill="none" stroke="#e8e8e8" stroke-width="1.5"/>
</svg>
